spring.application.name=frontend
server.port=${PORT:8081}

rest.base.url=${REST_BASE_URL:http://localhost:8080}
rest.user.name=${REST_USER_NAME:admin}
rest.user.password=${REST_USER_PASSWORD:admin}

# URL backendu z perspektywy PRZEGLĄDARKI (do SockJS/WebSocket).
# W docker compose jest to localhost:8080, w k8s to publiczny adres.
ws.public.url=${WS_PUBLIC_URL:http://localhost:8080}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.metrics.tags.application=${spring.application.name}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
