<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/edit-style.css}" rel="stylesheet" />
    <title>Edycja zadania</title>
</head>
<body>
<div class="page-bg" aria-hidden="true">
    <div class="shape shape-left"></div>
    <div class="shape shape-right"></div>
</div>

<div class="root" th:with="isDelete=${#strings.equalsIgnoreCase(param.delete, 'true')}">
    <form th:action="@{/taskEdit(projectId=${projectId})}"
          th:object="${task}"
          method="post"
          th:with="akcja=*{taskId} ? (${isDelete} ? 'delete' : 'update') : 'create',
                   opis=*{taskId} ? (${isDelete} ? 'Usun' : 'Aktualizuj') : 'Utworz'"
          autocomplete="off">

        <header class="form-header">
            <p class="eyebrow">Panel Zadania</p>
            <h1 th:text="${opis} + ' zadanie'">Edytuj zadanie</h1>
        </header>

        <div class="err" th:if="${#fields.hasErrors('*')}">
            BLEDY:
            <ul>
                <li th:each="err : ${#fields.errors('*')}" th:text="${err}">Blad</li>
            </ul>
        </div>

        <div class="container card">
            <div class="btns-panel">
                <button class="btn" type="submit" th:name="${akcja}" th:text="${opis}">Zapisz</button>
                <button class="btn btn-muted" type="submit" name="cancel" value="true">Anuluj</button>
            </div>

            <div class="field-wrap" th:if="*{taskId != null}">
                <label for="taskId" class="lbl">Id:</label>
                <input id="taskId" th:field="*{taskId}" class="fld" readonly />
            </div>

            <div class="field-wrap">
                <label for="name" class="lbl">Nazwa:</label>
                <input id="name" th:field="*{name}" class="fld" required th:readonly="*{taskId != null}" />
            </div>

            <div class="field-wrap">
                <label for="priority" class="lbl">Priorytet:</label>
                <select id="priority"
                        th:field="*{priority}"
                        class="fld"
                        required>
                    <option th:each="p : ${priorities}"
                            th:value="${p}"
                            th:text="${p.displayName}">
                        Priorytet
                    </option>
                </select>
            </div>

            <div class="field-wrap">
                <label for="status" class="lbl">Status:</label>
                <select id="status" th:field="*{status}" class="fld">
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.displayName}">STATUS</option>
                </select>
            </div>

            <div class="field-wrap">
                <label for="assignedUserId" class="lbl">Przypisany użytkownik:</label>

                <select id="assignedUserId" name="assignedUserId" class="fld">

                    <option value=""
                            th:text="${task.taskId != null ? 'Bez zmian' : 'Nie przypisuj'}">
                        Bez zmian
                    </option>

                    <option th:each="user : ${users}"
                            th:value="${user.getUser_id()}"
                            th:text="${user.username}"
                            th:selected="${task.getAssignedUserId() != null and task.getAssignedUserId() == user.getUser_id()}">
                    </option>

                </select>
            </div>

            <div class="danger-panel" th:if="*{taskId != null}">
                <button class="btn btn-danger" type="submit" name="delete" value="true">Usun</button>
            </div>
        </div>
    </form>

    <div th:if="${task.taskId != null}" style="margin-top:28px;">
        <div class="container card">
            <div class="btns-panel">
                <h2 style="margin:0; font-family:'Bricolage Grotesque',sans-serif; font-size:1.1rem; font-weight:700;">
                    Pliki Zadania
                </h2>
            </div>

            <div th:if="${taskFiles != null and !#lists.isEmpty(taskFiles)}">
                <div th:each="file : ${taskFiles}"
                     style="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; background:rgba(255,255,255,0.5); border:1px solid var(--line); border-radius:8px; margin-bottom:8px; gap:12px;">
                    <span style="font-weight:600; flex:1; word-break:break-word;" th:text="${file.name}">plik.pdf</span>
                    <div style="display:flex; gap:8px; flex-shrink:0;">
                        <a th:href="@{/files/{id}/download(id=${file.id})}"
                           class="btn" style="padding:6px 14px; font-size:0.85rem; text-decoration:none;">Pobierz</a>
                        <form th:action="@{/files/{id}/delete(id=${file.id})}" method="post" style="display:inline; margin:0;">
                            <input type="hidden" name="taskId" th:value="${task.taskId}"/>
                            <input type="hidden" name="taskProjectId" th:value="${projectId}"/>
                            <button type="submit" class="btn btn-danger" style="padding:6px 14px; font-size:0.85rem;">Usuń</button>
                        </form>
                    </div>
                </div>
            </div>

            <div th:if="${taskFiles == null or #lists.isEmpty(taskFiles)}"
                 style="text-align:center; padding:20px; color:var(--muted);">
                <p style="margin:0;">Brak plików w tym zadaniu</p>
            </div>

            <div th:if="${param.uploadError}" style="margin-top:12px; padding:10px 14px; background:#fef2f2; border:1px solid #fca5a5; border-radius:8px; color:#b91c1c; font-size:0.9rem;">
                <span th:if="${param.uploadError[0] == 'fileTooLarge'}">Plik jest zbyt duży. Maksymalny rozmiar to 10MB.</span>
                <span th:unless="${param.uploadError[0] == 'fileTooLarge'}">Wystąpił błąd podczas przesyłania pliku. Spróbuj ponownie.</span>
            </div>

            <form th:action="@{/files/task/{id}(id=${task.taskId})}" method="post" enctype="multipart/form-data"
                  style="margin-top:16px; padding-top:16px; border-top:1px solid var(--line);">
                <input type="hidden" name="projectId" th:value="${projectId}"/>
                <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                    <input type="file" name="file" required class="fld" style="flex:1; min-width:200px;"/>
                    <button type="submit" class="btn" style="margin:0;">Dodaj plik</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
