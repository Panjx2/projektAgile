<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/edit-style.css}" rel="stylesheet" />
    <title>Edycja zadania</title>
</head>
<body>
<div class="page-bg" aria-hidden="true">
    <div class="shape shape-left"></div>
    <div class="shape shape-right"></div>
</div>

<div class="root" th:with="isDelete=${#strings.equalsIgnoreCase(param.delete, 'true')}">
    <form th:action="@{/taskEdit(projectId=${projectId})}"
          th:object="${task}"
          method="post"
          th:with="akcja=*{taskId} ? (${isDelete} ? 'delete' : 'update') : 'create',
                   opis=*{taskId} ? (${isDelete} ? 'Usun' : 'Aktualizuj') : 'Utworz'"
          autocomplete="off">

        <header class="form-header">
            <p class="eyebrow">Panel Zadania</p>
            <h1 th:text="${opis} + ' zadanie'">Edytuj zadanie</h1>
        </header>

        <div class="err" th:if="${#fields.hasErrors('*')}">
            BLEDY:
            <ul>
                <li th:each="err : ${#fields.errors('*')}" th:text="${err}">Blad</li>
            </ul>
        </div>

        <div class="container card">
            <div class="btns-panel">
                <button class="btn" type="submit" th:name="${akcja}" th:text="${opis}">Zapisz</button>
                <button class="btn btn-muted" type="submit" name="cancel" value="true">Anuluj</button>
            </div>

            <div class="field-wrap" th:if="*{taskId != null}">
                <label for="taskId" class="lbl">Id:</label>
                <input id="taskId" th:field="*{taskId}" class="fld" readonly />
            </div>

            <div class="field-wrap">
                <label for="name" class="lbl">Nazwa:</label>
                <input id="name" th:field="*{name}" class="fld" required th:readonly="*{taskId != null}" />
            </div>

            <div class="field-wrap">
                <label for="priority" class="lbl">Priorytet:</label>
                <input id="priority" th:field="*{priority}" class="fld"
                       placeholder="LOW / MEDIUM / HIGH"
                       th:readonly="*{taskId != null}" />
            </div>

            <div class="field-wrap">
                <label for="status" class="lbl">Status:</label>
                <select id="status" th:field="*{status}" class="fld">
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}">STATUS</option>
                </select>
            </div>

            <div class="field-wrap">
                <label for="assignedUserId" class="lbl">Przypisany uzytkownik:</label>
                <select id="assignedUserId" name="assignedUserId" class="fld">
                    <option value="" th:text="*{taskId != null ? 'Bez zmian' : 'Nie przypisuj'}">Bez zmian</option>
                    <option th:each="user : ${users}"
                            th:value="${user.user_id}"
                            th:text="${user.username}"
                            th:selected="*{assignedUser != null && assignedUser.user_id == user.user_id}">
                        username
                    </option>
                </select>
            </div>

            <div class="danger-panel" th:if="*{taskId != null}">
                <button class="btn btn-danger" type="submit" name="delete" value="true">Usun</button>
            </div>
        </div>
    </form>
</div>
</body>
</html>
