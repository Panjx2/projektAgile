<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/list-style.css}" rel="stylesheet" />
    <link th:href="@{/css/navbar.css}" rel="stylesheet" />
    <title>Lista uzytkownikow</title>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-bg" aria-hidden="true">
    <div class="orb orb-left"></div>
    <div class="orb orb-right"></div>
</div>

<div class="root">
    <header class="hero">
        <p class="eyebrow">Studio Zarzadzania</p>
        <h1>Uzytkownicy</h1>
        <p class="subtitle">Zarzadzaj kontami uzytkownikow systemu.</p>
    </header>

    <nav class="nav">
        <a class="nav-chip" th:href="@{/projectList}">Projekty</a>
        <a class="nav-chip active" th:href="@{/userList}">Uzytkownicy</a>
        <a class="nav-chip" th:href="@{/chat}">Chat</a>
    </nav>

    <div class="top-panel">
        <a class="btn" th:href="@{/userEdit}">+ Nowy uzytkownik</a>
    </div>

    <section class="table-card">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Imie i Nazwisko</th>
                <th>Rola</th>
                <th>Akcje</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.user_id}">1</td>
                <td th:text="${user.username}">username</td>
                <td th:text="${user.email}">email@example.com</td>
                <td th:text="${user.firstName + ' ' + user.lastName}">Jan Kowalski</td>
                <td th:text="${user.role}">ROLE</td>
                <td>
                    <a class="btn btn-secondary" th:href="@{/userEdit(userId=${user.user_id})}">Edytuj</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="6" class="empty-state">Brak uzytkownikow.</td>
            </tr>
            </tbody>
        </table>
    </section>
</div>
</body>
</html>
