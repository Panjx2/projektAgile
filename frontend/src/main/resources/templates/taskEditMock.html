<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<!--    <link th:href="@{/css/mock-views.css}" rel="stylesheet" />-->
    <link rel="stylesheet" href="../static/css/mock-views.css">
    <title>Mock - Edycja Zadania</title>
</head>
<body>
<div class="page-bg" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
</div>

<div class="root">
    <header class="header">
        <p class="eyebrow">Mock View</p>
        <h1>Edycja Zadania</h1>
        <p class="subtitle">Przyklad formularza zadania bez integracji backend.</p>
        <nav class="nav">
            <a class="nav-chip" href="/projektList">Projekty</a>
            <a class="nav-chip" href="/userListMock">Uzytkownicy</a>
            <a class="nav-chip active" href="/taskListMock">Zadania</a>
        </nav>
    </header>

    <section class="panel">
        <form>
            <div class="form-grid">
                <div class="field">
                    <label for="taskId">ID zadania</label>
                    <input id="taskId" type="text" value="14" readonly>
                </div>
                <div class="field">
                    <label for="project">Projekt</label>
                    <select id="project">
                        <option selected>Website Redesign</option>
                        <option>API Cleanup</option>
                        <option>CRM Integracja</option>
                    </select>
                </div>
                <div class="field full">
                    <label for="name">Nazwa zadania</label>
                    <input id="name" type="text" value="Przygotowac dashboard">
                </div>
                <div class="field">
                    <label for="priority">Priorytet</label>
                    <select id="priority">
                        <option>LOW</option>
                        <option selected>HIGH</option>
                        <option>MEDIUM</option>
                    </select>
                </div>
                <div class="field">
                    <label for="status">Status</label>
                    <select id="status">
                        <option>TODO</option>
                        <option selected>IN_PROGRESS</option>
                        <option>DONE</option>
                    </select>
                </div>
                <div class="field full">
                    <label for="assigned">Przypisany uzytkownik</label>
                    <select id="assigned">
                        <option>anna.nowak</option>
                        <option selected>m.kowalski</option>
                        <option>test.viewer</option>
                    </select>
                </div>
                <div class="field full">
                    <label for="description">Opis</label>
                    <textarea id="description" rows="4">UI makieta formularza zadania do podpiecia w kolejnych krokach.</textarea>
                </div>
            </div>
            <div class="actions">
                <button class="btn" type="button">Zapisz</button>
                <button class="btn secondary" type="button">Anuluj</button>
                <button class="btn danger" type="button">Usun</button>
            </div>
        </form>
    </section>
</div>
</body>
</html>
