services:
  db:
    image: postgres:16-alpine
    container_name: projektagile-db
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./app
    container_name: projektagile-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/app
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_SECURITY_USER_NAME: admin
      SPRING_SECURITY_USER_PASSWORD: admin
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: projektagile-frontend
    environment:
      REST_BASE_URL: http://backend:8080
      REST_USER_NAME: admin
      REST_USER_PASSWORD: admin
      PORT: 8081
    depends_on:
      - backend
    ports:
      - "8081:8081"

volumes:
  postgres_data: