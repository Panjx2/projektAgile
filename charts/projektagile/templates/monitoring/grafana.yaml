{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    {{- include "projektagile.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-user: "{{ .Values.monitoring.grafana.adminUser }}"
  admin-password: "{{ .Values.monitoring.grafana.adminPassword }}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    {{- include "projektagile.labels" . | nindent 4 }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.{{ .Values.monitoring.namespace }}.svc.cluster.local:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    {{- include "projektagile.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: {{ .Values.monitoring.grafana.nodePort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    {{- include "projektagile.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.monitoring.grafana.image }}
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom: { secretKeyRef: { name: grafana-admin, key: admin-user } }
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: grafana-admin, key: admin-password } }
          resources:
            {{- toYaml .Values.monitoring.grafana.resources | nindent 12 }}
          volumeMounts:
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources }
            - { name: data, mountPath: /var/lib/grafana }
          readinessProbe: { httpGet: { path: /api/health, port: 3000 }, periodSeconds: 5 }
          livenessProbe: { httpGet: { path: /api/health, port: 3000 }, periodSeconds: 10 }
      volumes:
        - { name: datasources, configMap: { name: grafana-datasources } }
        - { name: data, emptyDir: {} }
{{- end }}
