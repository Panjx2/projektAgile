{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    {{- include "projektagile.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'backend'
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['backend-service.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.backend.port }}']
            labels:
              application: backend
      - job_name: 'frontend'
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['frontend-service.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.frontend.port }}']
            labels:
              application: frontend
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    {{- include "projektagile.labels" . | nindent 4 }}
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    {{- include "projektagile.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: {{ .Values.monitoring.prometheus.image }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time={{ .Values.monitoring.prometheus.retention }}
          ports:
            - containerPort: 9090
          resources:
            {{- toYaml .Values.monitoring.prometheus.resources | nindent 12 }}
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
            - { name: data, mountPath: /prometheus }
          readinessProbe: { httpGet: { path: /-/ready, port: 9090 }, periodSeconds: 5 }
          livenessProbe: { httpGet: { path: /-/healthy, port: 9090 }, periodSeconds: 10 }
      volumes:
        - { name: config, configMap: { name: prometheus-config } }
        - { name: data, emptyDir: {} }
{{- end }}
