namespace: projektagile

image:
  pullPolicy: IfNotPresent

backend:
  enabled: true
  image: projektagile-backend
  tag: "1.0"
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: "1"
      memory: 768Mi
  probes:
    startup:
      failureThreshold: 60
      periodSeconds: 5
      timeoutSeconds: 5
      initialDelaySeconds: 30
    liveness:
      periodSeconds: 10
      failureThreshold: 3
      timeoutSeconds: 3
    readiness:
      periodSeconds: 5
      failureThreshold: 3
      timeoutSeconds: 3

frontend:
  enabled: true
  image: projektagile-frontend
  tag: "1.0"
  replicas: 1
  port: 8081
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  probes:
    startup:
      failureThreshold: 60
      periodSeconds: 5
      timeoutSeconds: 5
      initialDelaySeconds: 30
    liveness:
      periodSeconds: 10
      failureThreshold: 3
      timeoutSeconds: 3
    readiness:
      periodSeconds: 5
      failureThreshold: 3
      timeoutSeconds: 3

postgres:
  enabled: true
  image: postgres:16-alpine
  database: app
  port: 5432
  storage: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  className: nginx
  host: ""

# Credentials become the Secret content. Override via -f or --set in real envs.
credentials:
  dbUser: postgres
  dbPassword: postgres
  adminUser: admin
  adminPassword: admin
  restUser: admin
  restPassword: admin

hpa:
  backend:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPU: 70
    targetMemory: 80
  frontend:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPU: 70

monitoring:
  enabled: true
  namespace: monitoring
  prometheus:
    image: prom/prometheus:v2.54.1
    retention: 24h
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  grafana:
    image: grafana/grafana:11.2.0
    adminUser: admin
    adminPassword: admin
    nodePort: 30030
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
