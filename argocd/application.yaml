apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: projektagile
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Panjx2/projektAgile.git
    targetRevision: main
    path: charts/projektagile
    helm:
      releaseName: projektagile
  destination:
    server: https://kubernetes.default.svc
    namespace: projektagile
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
