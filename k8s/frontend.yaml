apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: projektagile
spec:
  selector:
    app: frontend
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: projektagile
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: projektagile-frontend:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: PORT_FRONTEND
            - name: REST_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REST_BASE_URL
            - name: REST_USER_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REST_USER_NAME
            - name: REST_USER_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REST_USER_PASSWORD